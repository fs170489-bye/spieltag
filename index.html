<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-indigo-100 min-h-screen p-6 font-sans">

<div x-data="app" class="max-w-6xl mx-auto space-y-8">

<!-- TIMER -->
<div class="bg-slate-900 text-white rounded-2xl p-6 flex justify-between items-center">
<div>
<div class="text-xs opacity-60">SPIELZEIT</div>
<div class="text-5xl font-mono" x-text="timerDisplay"></div>
</div>
<div class="flex gap-3">
<button @click="startTimer" class="px-5 py-2 bg-green-500 rounded-xl">Start / Pause</button>
<button @click="resetTimer" class="px-5 py-2 bg-yellow-500 rounded-xl">Reset</button>
</div>
</div>

<!-- MODUS -->
<div x-show="step===0" class="bg-white p-10 rounded-3xl shadow-xl text-center">
<h1 class="text-3xl font-bold mb-8">Spielmodus wählen</h1>
<div class="flex justify-center gap-6">
<button @click="mode='single'; step=1" class="px-8 py-4 bg-blue-600 text-white rounded-2xl">Single</button>
<button @click="mode='twin'; step=1" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl">Twin</button>
</div>
</div>

<!-- TEAMS -->
<div x-show="step===1" class="bg-white p-10 rounded-3xl shadow-xl space-y-6">
<h2 class="text-2xl font-bold">Teams eingeben</h2>
<div class="grid md:grid-cols-2 gap-6">
<input x-model="team1" placeholder="Team 1" class="border p-3 rounded-xl">
<input x-model="team2" placeholder="Team 2" class="border p-3 rounded-xl">
</div>

<div class="text-center">
<button @click="if(team1 && team2) step=2" class="px-8 py-3 bg-indigo-600 text-white rounded-xl">Weiter zur Spielfeld Auswahl</button>
</div>
</div>

<!-- FELDER -->
<div x-show="step===2" class="bg-white p-10 rounded-3xl shadow-xl space-y-6">
<h2 class="text-2xl font-bold">Spielfelder wählen</h2>

<div class="flex gap-4 flex-wrap">
<button @click="fields=2" :class="btnClass(2)">HF1 + HF2</button>
<button @click="fields=3" :class="btnClass(3)">HF1 + HF2 + NF1</button>
<button @click="fields=4" :class="btnClass(4)">HF1 + HF2 + NF1 + NF2</button>
</div>

<div class="text-center pt-4">
<button @click="if(fields) step=3" class="px-8 py-3 bg-green-600 text-white rounded-xl">Weiter zu Begegnungen</button>
</div>
</div>

<!-- SPIELE -->
<div x-show="step===3" class="space-y-8">

<template x-if="fields>=1">
<div class="match">
<div class="matchTitle">HF1</div>
<div class="matchRow">
<div class="team">
<div x-text="team1 + ' A'"></div>
<button @click="dec('m1a')">-</button>
<button @click="inc('m1a')">+</button>
</div>

<div class="score">
<span x-text="scores.m1a"></span> : <span x-text="scores.m1b"></span>
</div>

<div class="team">
<div x-text="team2 + ' A'"></div>
<button @click="dec('m1b')">-</button>
<button @click="inc('m1b')">+</button>
</div>
</div>
</div>
</template>

<template x-if="fields>=2">
<div class="match">
<div class="matchTitle">HF2</div>
<div class="matchRow">
<div class="team">
<div x-text="team1 + ' B'"></div>
<button @click="dec('m2a')">-</button>
<button @click="inc('m2a')">+</button>
</div>

<div class="score">
<span x-text="scores.m2a"></span> : <span x-text="scores.m2b"></span>
</div>

<div class="team">
<div x-text="team2 + ' B'"></div>
<button @click="dec('m2b')">-</button>
<button @click="inc('m2b')">+</button>
</div>
</div>
</div>
</template>

<template x-if="fields>=3">
<div class="match">
<div class="matchTitle">NF1</div>
<div class="matchRow">
<div class="team">
<div x-text="team1"></div>
<button @click="dec('m3a')">-</button>
<button @click="inc('m3a')">+</button>
</div>

<div class="score">
<span x-text="scores.m3a"></span> : <span x-text="scores.m3b"></span>
</div>

<div class="team">
<div x-text="team2"></div>
<button @click="dec('m3b')">-</button>
<button @click="inc('m3b')">+</button>
</div>
</div>
</div>
</template>

<template x-if="fields>=4">
<div class="match">
<div class="matchTitle">NF2</div>
<div class="matchRow">
<div class="team">
<div x-text="team1"></div>
<button @click="dec('m4a')">-</button>
<button @click="inc('m4a')">+</button>
</div>

<div class="score">
<span x-text="scores.m4a"></span> : <span x-text="scores.m4b"></span>
</div>

<div class="team">
<div x-text="team2"></div>
<button @click="dec('m4b')">-</button>
<button @click="inc('m4b')">+</button>
</div>
</div>
</div>
</template>

</div>

</div>

<style>
.match{background:white;padding:20px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
.matchTitle{font-weight:bold;margin-bottom:10px}
.matchRow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;text-align:center}
.team button{margin:3px;padding:5px 10px;background:#4f46e5;color:white;border-radius:8px}
.score{font-size:28px;font-weight:bold}
</style>

<script>
document.addEventListener('alpine:init',()=>{
Alpine.data('app',()=>({

step:0,
mode:null,
team1:'',
team2:'',
fields:0,

scores:{m1a:0,m1b:0,m2a:0,m2b:0,m3a:0,m3b:0,m4a:0,m4b:0},

// timer

timeLeft:25*60,
timerDisplay:'25:00',
timer:null,

updateDisplay(){
let m=Math.floor(this.timeLeft/60)
let s=this.timeLeft%60
this.timerDisplay=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`
},

startTimer(){
if(this.timer){clearInterval(this.timer);this.timer=null;return}
this.timer=setInterval(()=>{if(this.timeLeft>0){this.timeLeft--;this.updateDisplay()}},1000)
},

resetTimer(){this.timeLeft=25*60;this.updateDisplay()},

inc(k){this.scores[k]++},
dec(k){if(this.scores[k]>0)this.scores[k]--},

btnClass(n){
return 'px-5 py-2 rounded-xl '+(this.fields===n?'bg-indigo-600 text-white':'bg-slate-200')
}

}))
})
</script>

</body>
</html>
