<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard",
 storageBucket: "nfv-scoreboard.firebasestorage.app",
 messagingSenderId: "727289331208",
 appId: "1:727289331208:web:de5e36f52c6d82b56ddbbd"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue

</script>

</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- GERÄTE VERBINDEN -->

<div x-show="role==='master'" class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Geräte verbinden</h2>

<div class="grid grid-cols-2 gap-6">

<div>
<h3 class="font-bold mb-2">Counter</h3>
<div id="qrCounter"></div>
</div>

<div>
<h3 class="font-bold mb-2">Zuschauer</h3>
<div id="qrViewer"></div>
</div>

</div>

</div>


<!-- TIMER -->

<div class="bg-slate-900 text-white p-6 rounded-2xl text-center">

<div class="text-xs opacity-70">SPIELZEIT</div>

<div class="text-6xl font-mono"
:class="{'animate-pulse text-red-500': timeLeft<=60}"
x-text="timerDisplay"></div>

<div class="mt-3 text-2xl font-bold">

<span x-text="team1"></span>
<span class="mx-2" x-text="pointsA"></span>
:
<span class="mx-2" x-text="pointsB"></span>
<span x-text="team2"></span>

</div>

</div>


<!-- SPIELFELDER -->

<template x-for="f in fieldList">

<div class="bg-white p-6 rounded-2xl shadow">

<h3 class="font-bold mb-2" x-text="f.name"></h3>

<div class="grid grid-cols-3 text-center items-center">

<div>

<div class="text-lg font-semibold mb-2" x-text="f.teamA"></div>

<button
x-show="canEdit()"
@click="dec(f.keyA)"
class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>

<button
x-show="canEdit()"
@click="inc(f.keyA)"
class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>

</div>

<div class="text-5xl font-bold">

<span x-text="scores[f.keyA]"></span> :
<span x-text="scores[f.keyB]"></span>

</div>

<div>

<div class="text-lg font-semibold mb-2" x-text="f.teamB"></div>

<button
x-show="canEdit()"
@click="dec(f.keyB)"
class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>

<button
x-show="canEdit()"
@click="inc(f.keyB)"
class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>

</div>

</div>

</div>

</template>


</div>

<script>

function app(){

return{

role:"master",
sessionId:"liveSpiel",

team1:"",
team2:"",

scores:{m1a:0,m1b:0,m2a:0,m2b:0},

pointsA:0,
pointsB:0,

timeLeft:0,
timerDisplay:"00:00",

init(){

const params=new URLSearchParams(window.location.search)

this.role=params.get("role")||"master"

this.listenFirebase()

this.createQR()

},

createQR(){

const base="https://fs170489-bye.github.io/spieltag/"

new QRCode(document.getElementById("qrCounter"),{
text:base+"?session="+this.sessionId+"&role=counter",
width:200,
height:200
})

new QRCode(document.getElementById("qrViewer"),{
text:base+"?session="+this.sessionId+"&role=viewer",
width:200,
height:200
})

},

canEdit(){

return this.role==="master" || this.role==="counter"

},

syncFirebase(){

dbSet(
dbRef(db,"spiele/"+this.sessionId),
{
scores:this.scores,
timeLeft:this.timeLeft,
pointsA:this.pointsA,
pointsB:this.pointsB
})

},

listenFirebase(){

dbOnValue(
dbRef(db,"spiele/"+this.sessionId),
(snapshot)=>{

const data=snapshot.val()

if(!data)return

this.scores=data.scores
this.timeLeft=data.timeLeft
this.pointsA=data.pointsA
this.pointsB=data.pointsB

})

},

inc(k){

this.scores[k]++

this.syncFirebase()

},

dec(k){

if(this.scores[k]>0)this.scores[k]--

this.syncFirebase()

},

get fieldList(){

return[
{name:"HF1",teamA:this.team1,teamB:this.team2,keyA:"m1a",keyB:"m1b"},
{name:"HF2",teamA:this.team1,teamB:this.team2,keyA:"m2a",keyB:"m2b"}
]

}

}

}

</script>

</body>
</html>
