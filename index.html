<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spieltaghelfer</title>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* DEIN STYLE UNVERÄNDERT */
body { font-family: Arial; background:#121212; color:white; text-align:center; }
.screen { display:none; }
.active { display:block; }
.btn { padding:10px; margin:10px; }
.score-val { font-size:30px; }
</style>
</head>

<body>

<div id="screen-modus" class="screen active">
<h1>Spieltaghelfer</h1>
<button class="btn" onclick="selectModus('single')">Single</button>
<button class="btn" onclick="selectModus('twin')">Twin</button>
</div>

<div id="screen-teams" class="screen">
<input id="name1" placeholder="Team 1">
<input id="name2" placeholder="Team 2">
<button onclick="saveTeams()">Weiter</button>
</div>

<div id="screen-zeit" class="screen">
<button onclick="setTimer(10)">10 Min</button>
<button onclick="setTimer(15)">15 Min</button>
<button onclick="setTimer(20)">20 Min</button>
</div>

<div id="screen-game" class="screen">
<h2 id="timer">00:00</h2>

<div id="felder"></div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
</div>

<script>

// 🔥 FIREBASE INIT
const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sessionId = "spiel1"

// 🔥 STATE
let state = {
 mode:null,
 team1:"",
 team2:"",
 scores:{a:0,b:0},
 time:600
}

// 🔥 NAVIGATION
function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

// 🔥 MODUS
function selectModus(m){
state.mode = m
syncGame()
showScreen("screen-teams")
}

// 🔥 TEAMS
function saveTeams(){
state.team1 = document.getElementById("name1").value
state.team2 = document.getElementById("name2").value
syncGame()
showScreen("screen-zeit")
}

// 🔥 ZEIT
function setTimer(min){
state.time = min*60
syncGame()
startGame()
}

// 🔥 SPIEL START
function startGame(){
renderFields()
showScreen("screen-game")
}

// 🔥 FELDER
function renderFields(){
let html = ""

if(state.mode==="single"){
html += fieldHTML("a","b")
}

if(state.mode==="twin"){
html += fieldHTML("a","b")
html += fieldHTML("a2","b2")
}

document.getElementById("felder").innerHTML = html
}

// 🔥 SCORE HTML
function fieldHTML(a,b){
return `
<div>
<button onclick="inc('${a}')">+</button>
<span class="score-val" id="${a}">0</span>
<button onclick="inc('${b}')">+</button>
<span class="score-val" id="${b}">0</span>
</div>
`
}

// 🔥 SCORE
function inc(k){
state.scores[k] = (state.scores[k] || 0) + 1
syncGame()
}

// 🔥 TIMER
let timerInt=null

function startTimer(){
timerInt = setInterval(()=>{
state.time--
updateTimer()
syncGame()
},1000)
}

function pauseTimer(){
clearInterval(timerInt)
}

function updateTimer(){
let m=Math.floor(state.time/60)
let s=state.time%60
document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")
}

// 🔥 FIREBASE WRITE
function syncGame(){
db.ref("spiele/"+sessionId).set(state)
}

// 🔥 FIREBASE LISTEN
db.ref("spiele/"+sessionId).on("value",(snap)=>{
let data = snap.val()
if(!data) return

state = data

updateTimer()
renderFields()

// update scores
for(let k in state.scores){
let el=document.getElementById(k)
if(el) el.innerText = state.scores[k]
}
})

</script>

</body>
</html>
