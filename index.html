<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue
</script>

</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- MODUS -->
<div x-show="step===0" class="bg-white p-8 rounded-xl text-center">
<h2 class="text-2xl font-bold mb-4">Spielmodus wählen</h2>

<button @click="mode='single'; next()" class="bg-blue-500 text-white px-6 py-3 m-2">Single</button>
<button @click="mode='twin'; next()" class="bg-indigo-500 text-white px-6 py-3 m-2">Twin</button>
</div>

<!-- TEAMS -->
<div x-show="step===1" class="bg-white p-8 rounded-xl">
<input x-model="team1" placeholder="Team A" class="border p-2 m-2">
<input x-model="team2" placeholder="Team B" class="border p-2 m-2">

<div class="flex justify-between mt-4">
<button @click="prev()" class="bg-gray-500 text-white px-4 py-2">Zurück</button>
<button @click="next()" class="bg-indigo-500 text-white px-4 py-2">Weiter</button>
</div>
</div>

<!-- ZEIT -->
<div x-show="step===2" class="bg-white p-8 rounded-xl">
<input type="number" x-model.number="minutes">

<div class="flex justify-between mt-4">
<button @click="prev()" class="bg-gray-500 text-white px-4 py-2">Zurück</button>
<button @click="startGame()" class="bg-green-600 text-white px-4 py-2">Start</button>
</div>
</div>

<!-- SPIEL -->
<div x-show="step===3">

<h2>Begegnung <span x-text="round"></span></h2>

<button @click="toggleQR('counter')">Counter QR</button>
<button @click="toggleQR('viewer')">Zuschauer QR</button>

<div x-show="showQR">
<canvas id="qrcode"></canvas>
<div x-text="qrText"></div>
</div>

<template x-for="f in fieldList" :key="f.name">
<div>
<h3 x-text="f.name"></h3>

<button @click="inc(f.keyA)" :disabled="role==='viewer'">+</button>
<span x-text="scores[f.keyA]"></span>

<button @click="inc(f.keyB)" :disabled="role==='viewer'">+</button>
<span x-text="scores[f.keyB]"></span>

</div>
</template>

</div>

</div>

<script>
function app(){
return{

sessionId:"liveSpiel",
role:"master",

step:0,
mode:null,

team1:"",
team2:"",

minutes:10,
round:1,

scores:{m1a:0,m1b:0,m2a:0,m2b:0},

showQR:false,
qrText:"",

init(){

const params=new URLSearchParams(window.location.search)

if(params.get("role")){
this.role=params.get("role")
this.sessionId=params.get("session") || this.sessionId
this.step=3
}

this.listenFirebase()
},

next(){this.step++},
prev(){if(this.step>0)this.step--},

startGame(){
this.step=3
this.syncFirebase()
},

toggleQR(type){

if(this.showQR){this.showQR=false;return}

this.showQR=true

let url=window.location.origin+window.location.pathname+
`?session=${this.sessionId}&role=${type}`

this.qrText=url

setTimeout(()=>{
QRCode.toCanvas(document.getElementById("qrcode"), url)
},100)

},

syncFirebase(){
dbSet(dbRef(db,"spiele/"+this.sessionId),{
mode:this.mode,
scores:this.scores
})
},

listenFirebase(){
dbOnValue(dbRef(db,"spiele/"+this.sessionId),(snap)=>{
let d=snap.val()
if(!d)return

this.mode=d.mode ?? this.mode
this.scores=d.scores ?? this.scores
})
},

inc(k){
this.scores[k]++
this.syncFirebase()
},

get fieldList(){

// 🔥 WICHTIG: MODE KOMMT JETZT AUS FIREBASE
if(this.mode==="twin"){
return [
{name:"HF1",keyA:"m1a",keyB:"m1b"},
{name:"HF2",keyA:"m2a",keyB:"m2b"}
]
}

return [
{name:"HF1",keyA:"m1a",keyB:"m1b"}
]

}

}
}
</script>

</body>
</html>
