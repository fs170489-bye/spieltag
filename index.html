<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard",
 storageBucket: "nfv-scoreboard.firebasestorage.app",
 messagingSenderId: "727289331208",
 appId: "1:727289331208:web:de5e36f52c6d82b56ddbbd"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue
</script>

</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- STEP 0 -->
<div x-show="step===0" class="bg-white p-8 rounded-xl shadow text-center">
<h2 class="text-3xl font-bold mb-6">Spielmodus wählen</h2>

<div class="grid grid-cols-2 gap-6">
<button @click="mode='single';next()" class="p-10 bg-blue-600 text-white text-2xl rounded-xl">Single</button>
<button @click="mode='twin';next()" class="p-10 bg-indigo-600 text-white text-2xl rounded-xl">Twin</button>
</div>
</div>

<!-- STEP 1 -->
<div x-show="step===1" class="bg-white p-8 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4">Teams</h2>

<div class="grid grid-cols-2 gap-4">
<input x-model="team1" class="border p-3 rounded" placeholder="Team A">
<input x-model="team2" class="border p-3 rounded" placeholder="Team B">
</div>

<div class="flex justify-between mt-6">
<button @click="prev()" class="bg-gray-500 text-white px-6 py-2 rounded">Zurück</button>
<button @click="next()" class="bg-indigo-600 text-white px-6 py-2 rounded">Weiter</button>
</div>
</div>

<!-- STEP 2 -->
<div x-show="step===2" class="bg-white p-8 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4">Zeit</h2>

<input type="number" x-model.number="minutes" class="border p-3 rounded w-32">

<div class="flex justify-between mt-6">
<button @click="prev()" class="bg-gray-500 text-white px-6 py-2 rounded">Zurück</button>
<button @click="next()" class="bg-indigo-600 text-white px-6 py-2 rounded">Weiter</button>
</div>
</div>

<!-- STEP 3 -->
<div x-show="step===3" class="bg-white p-8 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4">Spielfelder</h2>

<div class="flex gap-4">

<!-- SINGLE -->
<button x-show="mode==='single'" @click="fields=1" :class="btn(fields===1)">HF</button>
<button x-show="mode==='single'" @click="fields=2" :class="btn(fields===2)">HF + NF</button>

<!-- TWIN -->
<button x-show="mode==='twin'" @click="fields=2" :class="btn(fields===2)">HF1 + HF2</button>
<button x-show="mode==='twin'" @click="fields=3" :class="btn(fields===3)">+ NF1</button>
<button x-show="mode==='twin'" @click="fields=4" :class="btn(fields===4)">+ NF2</button>

</div>

<div class="flex justify-between mt-6">
<button @click="prev()" class="bg-gray-500 text-white px-6 py-2 rounded">Zurück</button>
<button @click="next()" class="bg-green-600 text-white px-6 py-2 rounded">Weiter</button>
</div>
</div>

<!-- STEP 4 (NEU) -->
<div x-show="step===4" class="bg-white p-8 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4">Geräte verbinden</h2>

<div class="grid grid-cols-2 gap-8">
<div><div id="qrCounter"></div></div>
<div><div id="qrViewer"></div></div>
</div>

<div class="flex justify-between mt-6">
<button @click="prev()" class="bg-gray-500 text-white px-6 py-2 rounded">Zurück</button>
<button @click="startGame()" class="bg-green-600 text-white px-6 py-2 rounded">Weiter zur Begegnung</button>
</div>
</div>

<!-- STEP 5 SPIEL -->
<div x-show="step===5">

<template x-for="f in fieldList">
<div class="bg-white p-6 rounded-xl mb-4">

<h3 class="font-bold mb-4" x-text="f.name"></h3>

<div class="grid grid-cols-3 text-center">

<div>
<button x-show="canEdit()" @click="dec(f.keyA)" class="bg-red-500 text-white w-16 h-16 rounded text-2xl">-</button>
<button x-show="canEdit()" @click="inc(f.keyA)" class="bg-green-600 text-white w-16 h-16 rounded text-2xl">+</button>
</div>

<div class="text-3xl font-bold">
<span x-text="scores[f.keyA]"></span> :
<span x-text="scores[f.keyB]"></span>
</div>

<div>
<button x-show="canEdit()" @click="dec(f.keyB)" class="bg-red-500 text-white w-16 h-16 rounded text-2xl">-</button>
<button x-show="canEdit()" @click="inc(f.keyB)" class="bg-green-600 text-white w-16 h-16 rounded text-2xl">+</button>
</div>

</div>

</div>
</template>

</div>

</div>

<script>
function app(){
return{

step:0,
mode:null,
team1:"",
team2:"",
fields:0,
minutes:10,

scores:{m1a:0,m1b:0,m2a:0,m2b:0,m3a:0,m3b:0,m4a:0,m4b:0},

role:"master",
sessionId:"liveSpiel",

init(){
const p=new URLSearchParams(location.search)
this.role=p.get("role")||"master"
this.createQR()
this.listenFirebase()
},

btn(active){
return "px-4 py-2 rounded text-white "+(active?"bg-indigo-600":"bg-gray-400")
},

next(){this.step++},
prev(){this.step--},

startGame(){this.step=5},

canEdit(){
return this.role==="master" || this.role==="counter"
},

createQR(){
const base=location.origin+location.pathname

new QRCode(document.getElementById("qrCounter"),{
text:base+"?role=counter",
width:120,height:120
})

new QRCode(document.getElementById("qrViewer"),{
text:base+"?role=viewer",
width:120,height:120
})
},

inc(k){
this.scores[k]++
this.syncFirebase()
},

dec(k){
if(this.scores[k]>0)this.scores[k]--
this.syncFirebase()
},

syncFirebase(){
dbSet(dbRef(db,"spiele/"+this.sessionId),{
scores:this.scores
})
},

listenFirebase(){
dbOnValue(dbRef(db,"spiele/"+this.sessionId),(s)=>{
let d=s.val()
if(!d)return
this.scores=d.scores
})
},

get fieldList(){

let arr=[]

if(this.mode==="single"){
arr.push({name:"HF1",keyA:"m1a",keyB:"m1b"})
if(this.fields===2){
arr.push({name:"NF",keyA:"m2a",keyB:"m2b"})
}
}

if(this.mode==="twin"){
arr.push({name:"HF1",keyA:"m1a",keyB:"m1b"})
arr.push({name:"HF2",keyA:"m2a",keyB:"m2b"})
if(this.fields>=3)arr.push({name:"NF1",keyA:"m3a",keyB:"m3b"})
if(this.fields===4)arr.push({name:"NF2",keyA:"m4a",keyB:"m4b"})
}

return arr
}

}
}
</script>

</body>
</html>
