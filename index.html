<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- QR LIB -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard",
 storageBucket: "nfv-scoreboard.firebasestorage.app",
 messagingSenderId: "727289331208",
 appId: "1:727289331208:web:de5e36f52c6d82b56ddbbd"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue

</script>

</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- TIMER -->
<div class="bg-slate-900 text-white p-6 rounded-2xl text-center">
<div class="text-xs opacity-70">SPIELZEIT</div>
<div class="text-6xl font-mono" x-text="timerDisplay"></div>

<div class="mt-3 text-2xl font-bold">
<span x-text="team1"></span>
<span class="mx-2" x-text="pointsA"></span> :
<span class="mx-2" x-text="pointsB"></span>
<span x-text="team2"></span>
</div>
</div>

<!-- SPIEL -->
<div x-show="step===3" class="space-y-6">

<h2 class="text-3xl font-bold">
Begegnung <span x-text="round"></span> / 3
</h2>

<!-- QR BUTTONS -->
<div class="flex gap-4 justify-center">

<button @click="toggleQR('counter')" class="px-4 py-2 bg-blue-600 text-white rounded">
Counter QR
</button>

<button @click="toggleQR('viewer')" class="px-4 py-2 bg-green-600 text-white rounded">
Zuschauer QR
</button>

</div>

<!-- QR DISPLAY -->
<div x-show="showQR" class="bg-white p-6 rounded-xl text-center">
<canvas id="qrcode"></canvas>
<div class="mt-2 text-sm text-gray-600" x-text="qrText"></div>
</div>

<!-- SPIELFELDER -->
<template x-for="f in fieldList" :key="f.name">
<div class="bg-white p-6 rounded-2xl shadow">

<h3 class="font-bold mb-2" x-text="f.name"></h3>

<div class="grid grid-cols-3 text-center items-center">

<div>
<div x-text="f.teamA"></div>
<button @click="inc(f.keyA)" :disabled="role!=='master' && role!=='counter'" class="bg-green-500 text-white px-4 py-2">+</button>
<button @click="dec(f.keyA)" :disabled="role!=='master' && role!=='counter'" class="bg-red-500 text-white px-4 py-2">−</button>
</div>

<div class="text-4xl">
<span x-text="scores[f.keyA]"></span> :
<span x-text="scores[f.keyB]"></span>
</div>

<div>
<div x-text="f.teamB"></div>
<button @click="inc(f.keyB)" :disabled="role!=='master' && role!=='counter'" class="bg-green-500 text-white px-4 py-2">+</button>
<button @click="dec(f.keyB)" :disabled="role!=='master' && role!=='counter'" class="bg-red-500 text-white px-4 py-2">−</button>
</div>

</div>
</div>
</template>

</div>

</div>

<script>
function app(){
return{

sessionId:"liveSpiel",
role:"master",

showQR:false,
qrText:"",

mode:"single",
step:3,
round:1,

team1:"Team A",
team2:"Team B",

scores:{m1a:0,m1b:0,m2a:0,m2b:0},

pointsA:0,
pointsB:0,

timeLeft:600,
timerDisplay:"10:00",

init(){

// URL PARAMS
const params=new URLSearchParams(window.location.search)
if(params.get("role")){
this.role=params.get("role")
this.sessionId=params.get("session") || "liveSpiel"
this.step=3
}

this.listenFirebase()
},

toggleQR(type){

if(this.showQR){
this.showQR=false
return
}

this.showQR=true

let url=window.location.origin+window.location.pathname+
`?session=${this.sessionId}&role=${type}`

this.qrText=url

setTimeout(()=>{
QRCode.toCanvas(document.getElementById("qrcode"), url)
},100)

},

syncFirebase(){
dbSet(dbRef(db,"spiele/"+this.sessionId),{
scores:this.scores,
pointsA:this.pointsA,
pointsB:this.pointsB
})
},

listenFirebase(){
dbOnValue(dbRef(db,"spiele/"+this.sessionId),(snapshot)=>{
const data=snapshot.val()
if(!data)return
this.scores=data.scores || this.scores
this.pointsA=data.pointsA || 0
this.pointsB=data.pointsB || 0
})
},

inc(k){
this.scores[k]++
this.syncFirebase()
},

dec(k){
if(this.scores[k]>0)this.scores[k]--
this.syncFirebase()
},

get fieldList(){

let arr=[]

if(this.mode==="single"){
arr.push({name:"HF1",teamA:this.team1,teamB:this.team2,keyA:"m1a",keyB:"m1b"})
}

if(this.mode==="twin"){
arr.push({name:"HF1",teamA:this.team1+" 1",teamB:this.team2+" 1",keyA:"m1a",keyB:"m1b"})
arr.push({name:"HF2",teamA:this.team1+" 2",teamB:this.team2+" 2",keyA:"m2a",keyB:"m2b"})
}

return arr
}

}
}
</script>

</body>
</html>
