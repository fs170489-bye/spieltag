<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- TIMER -->

<div class="bg-slate-900 text-white p-6 rounded-2xl text-center">

<div class="text-xs opacity-70">SPIELZEIT</div>

<div class="text-6xl font-mono"
:class="{'animate-pulse text-red-500': timeLeft<=60}"
x-text="timerDisplay"></div>

<div class="mt-3 text-2xl font-bold">

<span x-text="team1"></span>
<span class="mx-2" x-text="pointsA"></span>
:
<span class="mx-2" x-text="pointsB"></span>
<span x-text="team2"></span>

</div>

<div class="flex gap-3 justify-center mt-4">

<button @click="testTimer()" class="px-4 py-2 bg-purple-500 rounded text-white">
Test 10s
</button>

<button @click="startPauseTimer()" class="px-6 py-2 bg-green-500 rounded text-white">
Start / Pause
</button>

<button @click="resetTimer()" class="px-6 py-2 bg-yellow-500 rounded text-white">
Reset
</button>

</div>

</div>


<!-- MODUS AUSWAHL -->

<div x-show="step===0" class="bg-white p-8 rounded-2xl shadow text-center">

<h2 class="text-3xl font-bold mb-6">Spielmodus wählen</h2>

<div class="grid grid-cols-2 gap-6">

<button
@click="mode='single'; next()"
class="p-12 bg-blue-600 text-white text-2xl font-bold rounded-xl">
Single
</button>

<button
@click="mode='twin'; next()"
class="p-12 bg-indigo-600 text-white text-2xl font-bold rounded-xl">
Twin
</button>

</div>

</div>


<!-- TEAMS -->

<div x-show="step===1" class="bg-white p-8 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">Teams eingeben</h2>

<div class="grid grid-cols-2 gap-4">

<input x-model="team1" placeholder="Team A" class="border p-3 rounded">
<input x-model="team2" placeholder="Team B" class="border p-3 rounded">

</div>

<div class="flex justify-between mt-6">

<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">
Zurück
</button>

<button
@click="next()"
:disabled="!team1 || !team2"
class="px-6 py-2 bg-indigo-600 text-white rounded">
Weiter
</button>

</div>

</div>


<!-- FELDER -->

<div x-show="step===2 && mode==='twin'" class="bg-white p-8 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">Spielfelder wählen</h2>

<div class="flex gap-4">

<button @click="fields=2" :class="fieldBtn(2)">HF1 + HF2</button>
<button @click="fields=3" :class="fieldBtn(3)">HF1 + HF2 + NF1</button>
<button @click="fields=4" :class="fieldBtn(4)">HF1 + HF2 + NF1 + NF2</button>

</div>

<div class="flex justify-between mt-6">

<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">
Zurück
</button>

<button
@click="next()"
:disabled="!fields"
class="px-6 py-2 bg-indigo-600 text-white rounded">
Weiter
</button>

</div>

</div>


<!-- ZEIT -->

<div x-show="step===3" class="bg-white p-8 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">Zeit einstellen (Minuten)</h2>

<input
type="number"
x-model.number="minutes"
class="border p-3 rounded w-40 text-xl">

<div class="flex justify-between mt-6">

<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">
Zurück
</button>

<button @click="startGame()" class="px-6 py-2 bg-green-600 text-white rounded">
Spiel starten
</button>

</div>

</div>


<!-- SPIEL -->

<div x-show="step===4" class="space-y-6">

<h2 class="text-3xl font-bold">
Begegnung <span x-text="round"></span> / 3
</h2>

<div x-show="round===3"
class="bg-yellow-200 text-yellow-900 p-4 rounded-xl font-semibold text-center">

⚠️ 2–4 Spieler tauschen

</div>

<template x-for="f in fieldList">

<div class="bg-white p-6 rounded-2xl shadow">

<h3 class="font-bold mb-2" x-text="f.name"></h3>

<div class="grid grid-cols-3 text-center items-center">

<div>

<div class="text-lg font-semibold mb-2" x-text="team1 + ' ' + f.a"></div>

<button @click="dec(f.keyA)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>

<button @click="inc(f.keyA)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>

</div>

<div class="text-5xl font-bold">

<span x-text="scores[f.keyA]"></span> :
<span x-text="scores[f.keyB]"></span>

</div>

<div>

<div class="text-lg font-semibold mb-2" x-text="team2 + ' ' + f.b"></div>

<button @click="dec(f.keyB)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>

<button @click="inc(f.keyB)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>

</div>

</div>

</div>

</template>

<div class="flex justify-between mt-6">

<button @click="prevRound()" :disabled="round===1"
class="px-6 py-3 bg-gray-500 text-white rounded">
← Zurück
</button>

<button @click="nextRound()" :disabled="round===3"
class="px-6 py-3 bg-indigo-600 text-white rounded">
Weiter →
</button>

</div>

</div>

</div>


<script>

function app(){

return{

mode:null,
step:0,

team1:"",
team2:"",
fields:0,

round:1,
minutes:10,

scores:{
m1a:0,m1b:0,
m2a:0,m2b:0,
m3a:0,m3b:0,
m4a:0,m4b:0
},

pointsA:0,
pointsB:0,

timeLeft:0,
timer:null,
timerDisplay:"00:00",

init(){
this.resetTimer()
},

next(){ this.step++ },

prev(){ if(this.step>0) this.step-- },

startGame(){
this.timeLeft=this.minutes*60
this.updateDisplay()
this.step=4
},

testTimer(){
this.timeLeft=10
this.updateDisplay()
},

startPauseTimer(){

if(this.timer){
clearInterval(this.timer)
this.timer=null
return
}

this.timer=setInterval(()=>{

if(this.timeLeft>0){

this.timeLeft--
this.updateDisplay()

}else{

clearInterval(this.timer)
this.timer=null
new Audio("https://actions.google.com/sounds/v1/alarms/buzzer.ogg").play()
this.calculateTendenz()

}

},1000)

},

resetTimer(){
this.timeLeft=this.minutes*60
this.updateDisplay()
},

updateDisplay(){

let m=Math.floor(this.timeLeft/60)
let s=this.timeLeft%60

this.timerDisplay =
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

},

inc(k){
if(this.timeLeft===0) return
this.scores[k]++
},

dec(k){
if(this.timeLeft===0) return
if(this.scores[k]>0) this.scores[k]--
},

calculateTendenz(){

let a=0
let b=0

let hf1a=this.scores.m1a
let hf1b=this.scores.m1b

let hf2a=this.scores.m2a
let hf2b=this.scores.m2b

if(hf1a>hf1b) a++
else if(hf1b>hf1a) b++
else {a++;b++;}

if(hf2a>hf2b) a++
else if(hf2b>hf2a) b++
else {a++;b++;}

this.pointsA+=a
this.pointsB+=b

},

nextRound(){

this.calculateTendenz()

if(this.round<3){
this.round++
this.resetScores()
}

},

prevRound(){
if(this.round>1){
this.round--
}
},

resetScores(){

this.scores={
m1a:0,m1b:0,
m2a:0,m2b:0,
m3a:0,m3b:0,
m4a:0,m4b:0
}

},

fieldBtn(n){
return "px-5 py-3 rounded text-white "+
(this.fields===n ? "bg-indigo-600":"bg-gray-400")
},

get fieldList(){

let hf1
let hf2

if(this.round===1){
hf1={a:1,b:1}
hf2={a:2,b:2}
}

if(this.round===2){
hf1={a:1,b:2}
hf2={a:2,b:1}
}

if(this.round===3){
hf1={a:1,b:1}
hf2={a:2,b:2}
}

return [

{name:"HF1",a:hf1.a,b:hf1.b,keyA:"m1a",keyB:"m1b"},
{name:"HF2",a:hf2.a,b:hf2.b,keyA:"m2a",keyB:"m2b"},
{name:"NF1",a:3,b:3,keyA:"m3a",keyB:"m3b"},
{name:"NF2",a:4,b:4,keyA:"m4a",keyB:"m4b"}

]

}

}

}

</script>

</body>
</html>
