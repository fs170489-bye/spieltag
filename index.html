<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- ✅ QR LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard",
 storageBucket: "nfv-scoreboard.firebasestorage.app",
 messagingSenderId: "727289331208",
 appId: "1:727289331208:web:de5e36f52c6d82b56ddbbd"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue

</script>

</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- TIMER -->
<div class="bg-slate-900 text-white p-6 rounded-2xl text-center">
<div class="text-xs opacity-70">SPIELZEIT</div>
<div class="text-6xl font-mono"
:class="{'animate-pulse text-red-500': timeLeft<=60}"
x-text="timerDisplay"></div>

<div class="mt-3 text-2xl font-bold">
<span x-text="team1"></span>
<span class="mx-2" x-text="pointsA"></span> :
<span class="mx-2" x-text="pointsB"></span>
<span x-text="team2"></span>
</div>

<div class="flex gap-3 justify-center mt-4">
<button @click="testTimer()" class="px-4 py-2 bg-purple-500 rounded text-white">Test 10s</button>
<button @click="startPauseTimer()" class="px-6 py-2 bg-green-500 rounded text-white">Start / Pause</button>
<button @click="resetTimer()" class="px-6 py-2 bg-yellow-500 rounded text-white">Reset</button>
</div>
</div>

<!-- MODUS -->
<div x-show="step===0" class="bg-white p-8 rounded-2xl shadow text-center">
<h2 class="text-3xl font-bold mb-6">Spielmodus wählen</h2>
<div class="grid grid-cols-2 gap-6">
<button @click="mode='single'; next()" class="p-12 bg-blue-600 text-white text-2xl font-bold rounded-xl">Single</button>
<button @click="mode='twin'; next()" class="p-12 bg-indigo-600 text-white text-2xl font-bold rounded-xl">Twin</button>
</div>
</div>

<!-- TEAM -->
<div x-show="step===1" class="bg-white p-8 rounded-2xl shadow">
<h2 class="text-2xl font-bold mb-4">Teams eingeben</h2>
<div class="grid grid-cols-2 gap-4">
<input x-model="team1" placeholder="Team A" class="border p-3 rounded">
<input x-model="team2" placeholder="Team B" class="border p-3 rounded">
</div>
<div class="flex justify-between mt-6">
<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">Zurück</button>
<button @click="next()" :disabled="!team1 || !team2" class="px-6 py-2 bg-indigo-600 text-white rounded">Weiter</button>
</div>
</div>

<!-- ZEIT -->
<div x-show="step===2" class="bg-white p-8 rounded-2xl shadow">
<h2 class="text-2xl font-bold mb-4">Zeit einstellen</h2>
<input type="number" x-model.number="minutes" class="border p-3 rounded w-40 text-xl">
<div class="flex justify-between mt-6">
<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">Zurück</button>
<button @click="startGame()" class="px-6 py-2 bg-green-600 text-white rounded">Spiel starten</button>
</div>
</div>

<!-- SPIEL -->
<div x-show="step===3" class="space-y-6">

<h2 class="text-3xl font-bold">
 <div class="text-center mb-4">
    <button @click="toggleCounter()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">
        Counter verbinden
    </button>
</div>

<div x-show="showCounter" class="flex justify-center mb-6">
    <div id="qrCounter"></div>
</div>
Begegnung <span x-text="round"></span> / 3
</h2>

<!-- ✅ COUNTER BUTTON -->
<div class="text-center">
<button @click="toggleCounter()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">
Counter verbinden
</button>
</div>

<!-- ✅ QR -->
<div x-show="showCounter" class="flex justify-center">
<div id="qrCounter"></div>
</div>

<div x-show="mode==='twin' && round===3"
class="bg-yellow-200 text-yellow-900 p-4 rounded-xl font-semibold text-center">
⚠️ 2-4 Spieler tauschen
</div>

<template x-for="f in fieldList">
<div class="bg-white p-6 rounded-2xl shadow">
<h3 class="font-bold mb-2" x-text="f.name"></h3>

<div class="grid grid-cols-3 text-center items-center">

<div>
<div class="text-lg font-semibold mb-2" x-text="f.teamA"></div>
<button @click="dec(f.keyA)" :disabled="!timer" class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>
<button @click="inc(f.keyA)" :disabled="!timer" class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>
</div>

<div class="text-5xl font-bold">
<span x-text="scores[f.keyA]"></span> :
<span x-text="scores[f.keyB]"></span>
</div>

<div>
<div class="text-lg font-semibold mb-2" x-text="f.teamB"></div>
<button @click="dec(f.keyB)" :disabled="!timer" class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>
<button @click="inc(f.keyB)" :disabled="!timer" class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>
</div>

</div>
</div>
</template>

</div>

</div>

<script>
function app(){
return{

mode:null,
step:0,
team1:"",
team2:"",
round:1,
minutes:10,

scores:{m1a:0,m1b:0,m2a:0,m2b:0},

timeLeft:0,
timer:null,
timerDisplay:"00:00",

// ✅ NEU
showCounter:false,

init(){},

toggleCounter(){
this.showCounter=!this.showCounter

this.$nextTick(()=>{
if(this.showCounter){
const el=document.getElementById("qrCounter")
el.innerHTML=""

new QRCode(el,{
text:location.href+"?role=counter",
width:200,
height:200
})
}
})
},

next(){this.step++},
prev(){if(this.step>0)this.step--},

startGame(){
this.timeLeft=this.minutes*60
this.updateDisplay()
this.step=3
},

updateDisplay(){
let m=Math.floor(this.timeLeft/60)
let s=this.timeLeft%60
this.timerDisplay=m.toString().padStart(2,"0")+":"+s.toString().padStart(2,"0")
},

get fieldList(){

let arr=[]

if(this.mode==="single"){
arr.push({name:"HF1",teamA:this.team1,teamB:this.team2,keyA:"m1a",keyB:"m1b"})
}

if(this.mode==="twin"){

let hf1A=1
let hf1B=1
let hf2A=2
let hf2B=2

if(this.round===2){
hf1B=2
hf2B=1
}

arr.push({name:"HF1",teamA:this.team1+" "+hf1A,teamB:this.team2+" "+hf1B,keyA:"m1a",keyB:"m1b"})
arr.push({name:"HF2",teamA:this.team1+" "+hf2A,teamB:this.team2+" "+hf2B,keyA:"m2a",keyB:"m2b"})
}

return arr
}

}
}
</script>

</body>
</html>
