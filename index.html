<!-- NUR SCRIPT TEIL GEÄNDERT – REST BLEIBT WIE BEI DIR -->

<script>
function app(){

return{

role:"master",
sessionId:"liveSpiel",

mode:null,
step:0,

team1:"",
team2:"",
fields:0,

round:1,
minutes:10,

scores:{m1a:0,m1b:0,m2a:0,m2b:0,m3a:0,m3b:0,m4a:0,m4b:0},

pointsA:0,
pointsB:0,

timeLeft:0,
timer:null,
timerDisplay:"00:00",

init(){

const params = new URLSearchParams(window.location.search)

this.role = params.get("role") || "master"
this.sessionId = params.get("session") || "liveSpiel"

// 👉 WICHTIG: Counter & Viewer direkt ins Spiel
if(this.role !== "master"){
this.step = 4
}

this.listenFirebase()
},

// -------------------- FIREBASE --------------------

syncFirebase(){

// nur Master darf schreiben
if(this.role !== "master") return

dbSet(dbRef(db,"spiele/"+this.sessionId),{
mode:this.mode,
round:this.round,
scores:this.scores,
timeLeft:this.timeLeft,
pointsA:this.pointsA,
pointsB:this.pointsB,
team1:this.team1,
team2:this.team2,
fields:this.fields
})

},

listenFirebase(){

dbOnValue(dbRef(db,"spiele/"+this.sessionId),(snapshot)=>{

const data=snapshot.val()
if(!data)return

this.mode=data.mode
this.round=data.round
this.scores=data.scores || this.scores
this.timeLeft=data.timeLeft || 0
this.pointsA=data.pointsA || 0
this.pointsB=data.pointsB || 0
this.team1=data.team1 || ""
this.team2=data.team2 || ""
this.fields=data.fields || 0

this.updateDisplay()

})

},

// -------------------- NAV --------------------

next(){this.step++},
prev(){if(this.step>0)this.step--},

goDevices(){
this.step=6
this.$nextTick(()=>this.createQR())
},

startGame(){
this.timeLeft=this.minutes*60
this.updateDisplay()
this.step=4
this.syncFirebase()
},

// -------------------- TIMER --------------------

testTimer(){
if(this.role!=="master") return
this.timeLeft=10
this.updateDisplay()
this.syncFirebase()
},

startPauseTimer(){

if(this.role!=="master") return

if(this.timer){
clearInterval(this.timer)
this.timer=null
return
}

this.timer=setInterval(()=>{

if(this.timeLeft>0){
this.timeLeft--
this.updateDisplay()
this.syncFirebase()
}else{
clearInterval(this.timer)
this.timer=null
}

},1000)

},

resetTimer(){
if(this.role!=="master") return
this.timeLeft=this.minutes*60
this.updateDisplay()
this.syncFirebase()
},

updateDisplay(){
let m=Math.floor(this.timeLeft/60)
let s=this.timeLeft%60
this.timerDisplay=m.toString().padStart(2,"0")+":"+s.toString().padStart(2,"0")
},

// -------------------- SCORE --------------------

canEdit(){

// Counter nur wenn Zeit läuft
if(this.role==="counter"){
return this.timeLeft > 0
}

// Master immer
if(this.role==="master"){
return true
}

return false

},

inc(k){
if(!this.canEdit()) return
this.scores[k]++
this.syncFirebase()
},

dec(k){
if(!this.canEdit()) return
if(this.scores[k]>0)this.scores[k]--
this.syncFirebase()
},

// -------------------- QR --------------------

createQR(){

const base = window.location.origin + window.location.pathname

document.getElementById("qrCounter").innerHTML=""
document.getElementById("qrViewer").innerHTML=""

new QRCode(document.getElementById("qrCounter"),{
text: base + "?session="+this.sessionId+"&role=counter",
width:180,
height:180
})

new QRCode(document.getElementById("qrViewer"),{
text: base + "?session="+this.sessionId+"&role=viewer",
width:180,
height:180
})

},

// -------------------- UI --------------------

fieldBtn(n){
return "px-5 py-3 rounded text-white "+(this.fields===n?"bg-indigo-600":"bg-gray-400")
},

get fieldList(){

let arr=[]

if(this.mode==="single"){
arr.push({name:"HF1",teamA:this.team1,teamB:this.team2,keyA:"m1a",keyB:"m1b"})
if(this.fields===2){
arr.push({name:"NF",teamA:this.team1,teamB:this.team2,keyA:"m2a",keyB:"m2b"})
}
}

if(this.mode==="twin"){
arr.push({name:"HF1",teamA:this.team1+" 1",teamB:this.team2+" 1",keyA:"m1a",keyB:"m1b"})
arr.push({name:"HF2",teamA:this.team1+" 2",teamB:this.team2+" 2",keyA:"m2a",keyB:"m2b"})
if(this.fields>=3)arr.push({name:"NF1",teamA:this.team1+" 3",teamB:this.team2+" 3",keyA:"m3a",keyB:"m3b"})
if(this.fields===4)arr.push({name:"NF2",teamA:this.team1+" 4",teamB:this.team2+" 4",keyA:"m4a",keyB:"m4b"})
}

return arr
}

}
}
</script>
