<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue
</script>

</head>

<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">

<!-- TIMER -->
<div class="bg-slate-900 text-white p-6 rounded-2xl text-center">
<div class="text-6xl font-mono" x-text="timerDisplay"></div>
</div>

<!-- MODUS -->
<div x-show="step===0" class="bg-white p-8 rounded-2xl shadow text-center">
<h2 class="text-3xl font-bold mb-6">Spielmodus wählen</h2>

<button @click="mode='single'; next()" class="p-6 bg-blue-600 text-white rounded">Single</button>
<button @click="mode='twin'; next()" class="p-6 bg-indigo-600 text-white rounded">Twin</button>
</div>

<!-- TEAMS -->
<div x-show="step===1" class="bg-white p-8 rounded-2xl shadow">
<input x-model="team1" placeholder="Team A" class="border p-3">
<input x-model="team2" placeholder="Team B" class="border p-3">

<button @click="prev()">Zurück</button>
<button @click="next()">Weiter</button>
</div>

<!-- ZEIT -->
<div x-show="step===2" class="bg-white p-8 rounded-2xl shadow">
<input type="number" x-model.number="minutes">
<button @click="prev()">Zurück</button>
<button @click="startGame()">Start</button>
</div>

<!-- SPIEL -->
<div x-show="step===3">

<h2>Begegnung <span x-text="round"></span></h2>

<!-- QR BUTTONS -->
<div>
<button @click="toggleQR('counter')">Counter QR</button>
<button @click="toggleQR('viewer')">Zuschauer QR</button>
</div>

<div x-show="showQR">
<canvas id="qrcode"></canvas>
<div x-text="qrText"></div>
</div>

<template x-for="f in fieldList">
<div>
<h3 x-text="f.name"></h3>

<button @click="inc(f.keyA)" :disabled="role==='viewer'">+</button>
<span x-text="scores[f.keyA]"></span>

<button @click="inc(f.keyB)" :disabled="role==='viewer'">+</button>
<span x-text="scores[f.keyB]"></span>

</div>
</template>

</div>

</div>

<script>
function app(){
return{

sessionId:"liveSpiel",
role:"master",

step:0,
mode:null,

team1:"",
team2:"",

minutes:10,
round:1,

scores:{m1a:0,m1b:0,m2a:0,m2b:0},

showQR:false,
qrText:"",

init(){

const params=new URLSearchParams(window.location.search)

if(params.get("role")){
this.role=params.get("role")
this.sessionId=params.get("session")
this.step=3
}

this.listenFirebase()
},

next(){this.step++},
prev(){this.step--},

startGame(){
this.step=3
},

toggleQR(type){

if(this.showQR){
this.showQR=false
return
}

this.showQR=true

let url=window.location.origin+window.location.pathname+
`?session=${this.sessionId}&role=${type}`

this.qrText=url

setTimeout(()=>{
QRCode.toCanvas(document.getElementById("qrcode"), url)
},100)

},

listenFirebase(){
dbOnValue(dbRef(db,"spiele/"+this.sessionId),(snap)=>{
let d=snap.val()
if(!d)return
this.scores=d.scores || this.scores
})
},

syncFirebase(){
dbSet(dbRef(db,"spiele/"+this.sessionId),{
scores:this.scores
})
},

inc(k){
this.scores[k]++
this.syncFirebase()
},

get fieldList(){

if(this.mode==="twin"){
return [
{name:"HF1",keyA:"m1a",keyB:"m1b"},
{name:"HF2",keyA:"m2a",keyB:"m2b"}
]
}

return [
{name:"HF1",keyA:"m1a",keyB:"m1b"}
]

}

}
}
</script>

</body>
</html>
