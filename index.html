<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8 font-sans">

<div x-data="app()" class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl p-8">

    <!-- MODUS AUSWAHL -->
    <template x-if="mode === null">
        <div class="text-center space-y-8">
            <h1 class="text-4xl font-bold">Spielmodus wählen</h1>
            <div class="flex justify-center gap-8">
                <button @click="selectMode('single')"
                    class="px-12 py-6 bg-blue-600 text-white text-2xl font-bold rounded-2xl hover:bg-blue-700 shadow-xl">
                    ⚽ Single-Spiel
                </button>
                <button @click="selectMode('twin')"
                    class="px-12 py-6 bg-indigo-600 text-white text-2xl font-bold rounded-2xl hover:bg-indigo-700 shadow-xl">
                    👥 Twin-Modus
                </button>
            </div>
        </div>
    </template>

    <!-- SINGLE MODUS -->
    <template x-if="mode === 'single'">
        <div>
            <h1 class="text-3xl font-bold text-center mb-8">Single-Spiel</h1>

            <div class="grid md:grid-cols-2 gap-6 mb-10">
                <input x-model="single.teamA.name" placeholder="Team A"
                    class="p-4 border rounded-xl">
                <input x-model="single.teamB.name" placeholder="Team B"
                    class="p-4 border rounded-xl">
            </div>

            <template x-if="single.teamA.name && single.teamB.name">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="scoreCard bg-blue-600">
                        <h2 x-text="single.teamA.name"></h2>
                        <div x-text="single.teamA.score"></div>
                        <button @click="single.teamA.score++">+1</button>
                    </div>
                    <div class="scoreCard bg-green-600">
                        <h2 x-text="single.teamB.name"></h2>
                        <div x-text="single.teamB.score"></div>
                        <button @click="single.teamB.score++">+1</button>
                    </div>
                </div>
            </template>

            <div class="mt-10">
                <button @click="resetSingle" class="btnRed">Reset Scores</button>
            </div>
        </div>
    </template>

    <!-- TWIN MODUS -->
    <template x-if="mode === 'twin'">
        <div>
            <h1 class="text-3xl font-bold text-center mb-8">Twin-Modus</h1>

            <!-- Team Eingabe -->
            <div class="grid md:grid-cols-2 gap-6 mb-10">
                <input x-model="twin.team1" placeholder="Team 1"
                    class="p-4 border rounded-xl">
                <input x-model="twin.team2" placeholder="Team 2"
                    class="p-4 border rounded-xl">
            </div>

            <template x-if="twin.team1 && twin.team2">
                <div class="space-y-10">

                    <!-- RUNDE INFO -->
                    <div class="text-center">
                        <h2 class="text-2xl font-bold mb-2">Runde <span x-text="twin.round"></span></h2>
                        <button @click="nextRound" class="btnBlue">Nächste Runde</button>
                    </div>

                    <!-- SPIELE -->
                    <div class="grid md:grid-cols-2 gap-10">

                        <!-- Spiel 1 -->
                        <div class="match">
                            <h3 x-text="match1A"></h3>
                            <div class="scoreRow">
                                <button @click="twin.scores.m1a++">+1</button>
                                <span x-text="twin.scores.m1a"></span>
                                <span>:</span>
                                <span x-text="twin.scores.m1b"></span>
                                <button @click="twin.scores.m1b++">+1</button>
                            </div>
                            <h3 x-text="match1B"></h3>
                        </div>

                        <!-- Spiel 2 -->
                        <div class="match">
                            <h3 x-text="match2A"></h3>
                            <div class="scoreRow">
                                <button @click="twin.scores.m2a++">+1</button>
                                <span x-text="twin.scores.m2a"></span>
                                <span>:</span>
                                <span x-text="twin.scores.m2b"></span>
                                <button @click="twin.scores.m2b++">+1</button>
                            </div>
                            <h3 x-text="match2B"></h3>
                        </div>

                    </div>

                    <div class="text-center">
                        <button @click="resetTwin" class="btnRed">Reset Twin</button>
                    </div>

                </div>
            </template>
        </div>
    </template>

</div>

<style>
.scoreCard { @apply text-white p-8 rounded-2xl text-center shadow-xl }
.scoreCard h2 { @apply text-2xl font-bold mb-4 }
.scoreCard div { @apply text-6xl font-black mb-6 }
.scoreCard button { @apply px-8 py-4 bg-white text-black rounded-xl font-bold }

.match { @apply bg-gray-100 p-6 rounded-2xl shadow-lg text-center }
.scoreRow { @apply flex justify-center items-center gap-4 text-3xl font-bold my-4 }

.btnBlue { @apply px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 }
.btnRed { @apply px-6 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 }
</style>

<script>
function app() {
    return {
        mode: null,

        selectMode(m) { this.mode = m },

        // SINGLE
        single: {
            teamA: { name:'', score:0 },
            teamB: { name:'', score:0 }
        },
        resetSingle() {
            this.single.teamA.score = 0
            this.single.teamB.score = 0
        },

        // TWIN
        twin: {
            team1: '',
            team2: '',
            round: 1,
            scores: { m1a:0, m1b:0, m2a:0, m2b:0 }
        },

        get match1A() {
            if (this.twin.round === 1) return this.twin.team1 + ' A'
            return this.twin.team1 + ' A'
        },
        get match1B() {
            if (this.twin.round === 1) return this.twin.team2 + ' A'
            return this.twin.team2 + ' B'
        },
        get match2A() {
            if (this.twin.round === 1) return this.twin.team1 + ' B'
            return this.twin.team1 + ' B'
        },
        get match2B() {
            if (this.twin.round === 1) return this.twin.team2 + ' B'
            return this.twin.team2 + ' A'
        },

        nextRound() {
            this.twin.round = this.twin.round === 1 ? 2 : 1
            this.resetTwinScores()
        },

        resetTwinScores() {
            this.twin.scores = { m1a:0, m1b:0, m2a:0, m2b:0 }
        },

        resetTwin() {
            this.twin.team1=''
            this.twin.team2=''
            this.twin.round=1
            this.resetTwinScores()
        }
    }
}
</script>

</body>
</html>
