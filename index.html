<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFV Twin-Modus Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8 font-sans">
    <div x-data="scoreboard()" x-init="init()" class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
        <!-- Team Eingabe -->
        <div class="mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-6 text-center">NFV Twin-Modus Scoreboard</h1>
            <div class="grid md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Team A Name</label>
                    <input type="text" x-model="teamA.name" @keyup.enter="addTeam('A')" 
                           class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Team B Name</label>
                    <input type="text" x-model="teamB.name" @keyup.enter="addTeam('B')"
                           class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
            </div>
            <div class="flex gap-4 justify-center">
                <button @click="addTeam('A')" 
                        class="px-8 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-all duration-200 shadow-lg">
                    Team A anlegen
                </button>
                <button @click="addTeam('B')"
                        class="px-8 py-3 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition-all duration-200 shadow-lg">
                    Team B anlegen
                </button>
            </div>
        </div>

        <!-- Scoreboard -->
        <template x-if="teamA.name && teamB.name">
            <div class="grid md:grid-cols-2 gap-8 items-center mb-12">
                <!-- Team A -->
                <div class="text-center p-8 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-2xl shadow-xl">
                    <h2 class="text-3xl font-bold mb-4" x-text="teamA.name || 'Team A'"></h2>
                    <div class="text-6xl font-black mb-6" x-text="teamA.score"></div>
                    <button @click="teamA.score++" 
                            class="px-12 py-6 bg-white text-blue-600 text-2xl font-bold rounded-2xl hover:bg-gray-100 transition-all duration-300 shadow-2xl mx-4">
                        +1 Tor
                    </button>
                </div>

                <!-- Team B -->
                <div class="text-center p-8 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-2xl shadow-xl">
                    <h2 class="text-3xl font-bold mb-4" x-text="teamB.name || 'Team B'"></h2>
                    <div class="text-6xl font-black mb-6" x-text="teamB.score"></div>
                    <button @click="teamB.score++" 
                            class="px-12 py-6 bg-white text-green-600 text-2xl font-bold rounded-2xl hover:bg-gray-100 transition-all duration-300 shadow-2xl mx-4">
                        +1 Tor
                    </button>
                </div>
            </div>

            <!-- Timer & Controls -->
            <div class="bg-gray-50 p-8 rounded-2xl shadow-lg">
                <div class="text-center mb-8">
                    <div class="text-5xl font-mono font-bold text-gray-900 mb-4" x-text="timerDisplay"></div>
                    <div class="text-xl text-gray-600 mb-6">Spielzeit (20:00 Min. Standard)</div>
                </div>
                <div class="flex flex-wrap gap-4 justify-center items-center">
                    <button @click="startTimer()" 
                            :disabled="isRunning"
                            class="px-8 py-4 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 transition-all duration-200 shadow-lg disabled:opacity-50">
                        <span x-show="!isRunning">⏯️ Start</span>
                        <span x-show="isRunning">⏸️ Pause</span>
                    </button>
                    <button @click="resetTimer()" 
                            class="px-8 py-4 bg-yellow-500 text-white font-bold rounded-xl hover:bg-yellow-600 transition-all duration-200 shadow-lg">
                        🔄 Reset
                    </button>
                    <button @click="setTime(20*60)" 
                            class="px-6 py-4 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition-all duration-200 shadow-lg">
                        20 Min
                    </button>
                    <button @click="setTime(15*60)" 
                            class="px-6 py-4 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition-all duration-200 shadow-lg">
                        15 Min
                    </button>
                    <button @click="resetScores()" 
                            class="px-8 py-4 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-all duration-200 shadow-lg">
                        Scores zurücksetzen
                    </button>
                </div>
            </div>

            <!-- Status -->
            <div class="mt-8 p-6 bg-indigo-100 rounded-xl text-center">
                <p class="text-lg font-semibold text-indigo-800">
                    Status: <span x-text="isRunning ? '🟢 Spiel läuft' : '⏹️ Spiel pausiert'"></span>
                </p>
            </div>
        </template>
    </div>

    <script>
        function scoreboard() {
            return {
                teamA: { name: '', score: 0 },
                teamB: { name: '', score: 0 },
                timeLeft: 20 * 60, // 20 Minuten in Sekunden
                isRunning: false,
                timer: null,
                timerDisplay: '20:00',

                init() {
                    this.updateDisplay();
                },

                addTeam(side) {
                    if (side === 'A') {
                        if (!this.teamA.name.trim()) return;
                    } else {
                        if (!this.teamB.name.trim()) return;
                    }
                    // Team ist "angelegt" wenn Name eingegeben
                },

                updateDisplay() {
    const mins = Math.floor(this.timeLeft / 60);
    const secs = this.timeLeft % 60;
    this.timerDisplay = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
},

                startTimer() {
                    if (this.isRunning) {
                        clearInterval(this.timer);
                        this.timer = null;
                        this.isRunning = false;
                    } else {
                        this.isRunning = true;
                        this.timer = setInterval(() => {
                            if (this.timeLeft > 0) {
                                this.timeLeft--;
                                this.updateDisplay();
                            } else {
                                this.stopTimer();
                                alert('Zeit abgelaufen!');
                            }
                        }, 1000);
                    }
                },

                stopTimer() {
                    clearInterval(this.timer);
                    this.timer = null;
                    this.isRunning = false;
                },

                resetTimer() {
                    this.stopTimer();
                    this.timeLeft = 20 * 60;
                    this.updateDisplay();
                },

                setTime(seconds) {
                    this.timeLeft = seconds;
                    this.updateDisplay();
                },

                resetScores() {
                    this.teamA.score = 0;
                    this.teamB.score = 0;
                }
            }
        }
    </script>
</body>
</html>
