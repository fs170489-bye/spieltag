<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-indigo-100 min-h-screen p-4 md:p-8 font-sans">

<div x-data="app()" x-init="init()" class="max-w-7xl mx-auto space-y-8">

    <!-- HEADER / TIMER BAR -->
    <div class="bg-slate-900 text-white rounded-3xl p-6 md:p-8 shadow-2xl">
        <div class="flex flex-col 2xl:flex-row items-center justify-between gap-8">

            <div class="text-center 2xl:text-left">
                <div class="text-xs tracking-[0.2em] opacity-60">SPIELZEIT</div>
                <div class="text-6xl md:text-7xl font-mono font-black" x-text="timerDisplay"></div>
            </div>

            <div class="flex flex-wrap gap-3 justify-center">
                <button @click="startTimer" class="ctrlBtn bg-green-500 hover:bg-green-600">
                    <span x-show="!isRunning">▶ Start</span>
                    <span x-show="isRunning">⏸ Pause</span>
                </button>
                <button @click="resetTimer" class="ctrlBtn bg-yellow-500 hover:bg-yellow-600">Reset</button>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <template x-for="m in [10,15,20,25,30]" :key="m">
                    <button @click="setMinutes(m)"
                        class="timeBtn"
                        :class="timeLeft===m*60 ? 'bg-indigo-500 text-white ring-4 ring-indigo-300' : 'bg-white text-black'">
                        <span x-text="m + ' Min'"></span>
                    </button>
                </template>
            </div>
        </div>
    </div>

    <!-- MODE SELECT -->
    <div x-show="mode === null" x-cloak class="text-center py-16">
            <h1 class="text-4xl md:text-5xl font-bold mb-14">Spielmodus wählen</h1>
            <div class="grid md:grid-cols-2 gap-10 max-w-4xl mx-auto">
                <button type="button" @click="setMode('single')" class="modeCard bg-blue-600 hover:bg-blue-700">
                    <div class="text-6xl mb-4">⚽</div>
                    <div>Single-Spiel</div>
                </button>
                <button type="button" @click="setMode('twin')" class="modeCard bg-indigo-600 hover:bg-indigo-700">
                    <div class="text-6xl mb-4">👥</div>
                    <div>Twin-Modus</div>
                </button>
            </div>
        </div>

    <!-- SINGLE MODE -->
    <template x-if="mode==='single'">
        <div class="viewCard">
            <div class="viewHeader">
                <h2>Single-Spiel</h2>
                <button @click="backToMenu" class="backBtn">Modus wechseln</button>
            </div>

            <div class="grid md:grid-cols-2 gap-6 mb-12">
                <input x-model="single.teamA.name" placeholder="Team A" class="input">
                <input x-model="single.teamB.name" placeholder="Team B" class="input">
            </div>

            <template x-if="single.teamA.name && single.teamB.name">
                <div class="grid md:grid-cols-2 gap-10">

                    <div class="teamCard bg-blue-600">
                        <h3 x-text="single.teamA.name"></h3>
                        <div class="score" x-text="single.teamA.score"></div>
                        <div class="goalRow">
                            <button @click="decrement(single.teamA)" class="goalBtnMinus">−</button>
                            <button @click="single.teamA.score++" class="goalBtnPlus">+ Tor</button>
                        </div>
                    </div>

                    <div class="teamCard bg-green-600">
                        <h3 x-text="single.teamB.name"></h3>
                        <div class="score" x-text="single.teamB.score"></div>
                        <div class="goalRow">
                            <button @click="decrement(single.teamB)" class="goalBtnMinus">−</button>
                            <button @click="single.teamB.score++" class="goalBtnPlus">+ Tor</button>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </template>

    <!-- TWIN MODE -->
    <template x-if="mode==='twin'">
        <div class="viewCard space-y-10">
            <div class="viewHeader">
                <h2>Twin-Modus</h2>
                <button @click="backToMenu" class="backBtn">Modus wechseln</button>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <input x-model="twin.team1" placeholder="Team 1" class="input">
                <input x-model="twin.team2" placeholder="Team 2" class="input">
            </div>

            <template x-if="twin.team1 && twin.team2">
                <div class="space-y-10">

                    <!-- ROUND BAR -->
                    <div class="roundBar">
                        <div class="roundInfo">
                            <div class="text-xs opacity-60 tracking-wider">RUNDE</div>
                            <div class="text-2xl font-bold" x-text="twin.round"></div>
                        </div>
                        <button @click="nextRound" class="nextBtn">Nächste Runde</button>
                    </div>

                    <!-- MATCHES -->
                    <div class="grid xl:grid-cols-2 gap-10">

                        <!-- MATCH 1 -->
                        <div class="matchCard">
                            <div class="matchHeader">Spiel 1</div>

                            <div class="matchTeam">
                                <span x-text="match1A"></span>
                                <div class="miniScoreRow">
                                    <button @click="dec($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].getAttribute('x-text').split('.').pop())" class="miniBtn">−</button>
                                    <button @click="inc($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].getAttribute('x-text').split('.').pop())" class="miniBtn">+</button>
                                    <span x-text="$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].__x.$data.twin.scores[$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].getAttribute('x-text').split('.').pop()]"></span>
                                    <span class="opacity-40">:</span>
                                    <span x-text="$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].__x.$data.twin.scores[$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].getAttribute('x-text').split('.').pop()]"></span>
                                    <button @click="dec($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].getAttribute('x-text').split('.').pop())" class="miniBtn">−</button>
                                    <button @click="inc($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].getAttribute('x-text').split('.').pop())" class="miniBtn">+</button>
                                </div>
                                <span x-text="match1B"></span>
                            </div>
                        </div>

                        <!-- MATCH 2 -->
                        <div class="matchCard">
                            <div class="matchHeader">Spiel 2</div>

                            <div class="matchTeam">
                                <span x-text="match2A"></span>
                                <div class="miniScoreRow">
                                    <button @click="dec($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].getAttribute('x-text').split('.').pop())" class="miniBtn">−</button>
                                    <button @click="inc($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].getAttribute('x-text').split('.').pop())" class="miniBtn">+</button>
                                    <span x-text="$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].__x.$data.twin.scores[$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[0].getAttribute('x-text').split('.').pop()]"></span>
                                    <span class="opacity-40">:</span>
                                    <span x-text="$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].__x.$data.twin.scores[$el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].getAttribute('x-text').split('.').pop()]"></span>
                                    <button @click="dec($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].getAttribute('x-text').split('.').pop())" class="miniBtn">−</button>
                                    <button @click="inc($el.closest('.matchCard').querySelectorAll('[x-text^=\"twin.scores\"]')[1].getAttribute('x-text').split('.').pop())" class="miniBtn">+</button>
                                </div>
                                <span x-text="match2B"></span>
                            </div>
                        </div>

                    </div>

                    <!-- DASHBOARD -->
                    <div class="dashboard">
                        <h3 class="dashTitle">NFV Twin Dashboard</h3>

                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="dashCard">
                                <div class="dashTeam" x-text="twin.team1"></div>
                                <div>Gesamt Tore: <b x-text="team1Goals"></b></div>
                                <div>Gegentore: <b x-text="team2Goals"></b></div>
                                <div>Differenz: <b :class="goalDiffClass(team1Diff)" x-text="team1Diff"></b></div>
                            </div>

                            <div class="dashCard">
                                <div class="dashTeam" x-text="twin.team2"></div>
                                <div>Gesamt Tore: <b x-text="team2Goals"></b></div>
                                <div>Gegentore: <b x-text="team1Goals"></b></div>
                                <div>Differenz: <b :class="goalDiffClass(team2Diff)" x-text="team2Diff"></b></div>
                            </div>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </template>

</div>

<style>
.viewCard { @apply bg-white rounded-3xl shadow-2xl p-6 md:p-10 }
.viewHeader { @apply flex flex-col md:flex-row items-center justify-between gap-6 mb-10 }
.viewHeader h2 { @apply text-3xl md:text-4xl font-bold }
.backBtn { @apply px-5 py-2 rounded-xl bg-slate-200 hover:bg-slate-300 font-semibold }

.modeCard { @apply text-white text-3xl font-bold p-16 rounded-3xl shadow-xl transition transform hover:scale-105 }

.input { @apply p-4 border rounded-xl w-full text-lg shadow-sm focus:ring-2 focus:ring-indigo-400 }

.ctrlBtn { @apply px-6 py-3 rounded-xl font-bold shadow }
.timeBtn { @apply px-4 py-2 rounded-lg font-bold shadow }

.teamCard { @apply text-white p-10 rounded-3xl text-center shadow-2xl }
.teamCard h3 { @apply text-2xl md:text-3xl font-bold mb-6 }
.score { @apply text-7xl md:text-8xl font-black mb-8 }
.goalRow { @apply flex justify-center items-center gap-6 }
.goalBtnPlus { @apply px-10 py-4 bg-white text-black text-xl font-bold rounded-xl shadow hover:bg-gray-100 }
.goalBtnMinus { @apply px-6 py-4 bg-black/20 text-white text-2xl font-bold rounded-xl shadow hover:bg-black/30 }

.roundBar { @apply flex items-center justify-between bg-indigo-50 border border-indigo-200 px-6 py-4 rounded-2xl }
.roundInfo { @apply flex items-end gap-4 }
.nextBtn { @apply px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow hover:bg-indigo-700 }

.matchCard { @apply bg-gradient-to-br from-slate-50 to-white p-8 rounded-3xl shadow-xl border }
.matchHeader { @apply text-lg font-bold mb-6 text-indigo-700 tracking-wide }
.matchTeam { @apply grid grid-cols-3 items-center text-xl font-semibold gap-4 }
.miniScoreRow { @apply flex justify-center items-center gap-5 text-4xl font-black }
.miniBtn { @apply w-12 h-12 rounded-xl bg-indigo-600 text-white text-2xl font-bold shadow hover:bg-indigo-700 }

.dashboard { @apply bg-slate-900 text-white p-8 rounded-3xl shadow-2xl }
.dashTitle { @apply text-2xl font-bold mb-8 text-center }
.dashCard { @apply bg-white/10 rounded-2xl p-6 space-y-2 }
.dashTeam { @apply text-xl font-bold mb-2 }

.pos { @apply text-green-400 }
.neg { @apply text-red-400 }
.zero { @apply text-slate-300 }
[x-cloak]{display:none!important}
</style>

<script>
function app(){
return{
    mode:null,

    // TIMER
    timeLeft:25*60,
    timerDisplay:'25:00',
    isRunning:false,
    timer:null,

    init(){
        this.loadState()
        this.updateDisplay()
        this.$watch('$data', () => this.saveState())
    },

    // ---------- TIMER ----------
    updateDisplay(){
        const m=Math.floor(this.timeLeft/60)
        const s=this.timeLeft%60
        this.timerDisplay=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`
    },

    startTimer(){
        if(this.isRunning){
            clearInterval(this.timer)
            this.isRunning=false
        }else{
            this.isRunning=true
            this.timer=setInterval(()=>{
                if(this.timeLeft>0){
                    this.timeLeft--
                    this.updateDisplay()
                }else{
                    this.stopTimer()
                    alert("Zeit abgelaufen!")
                }
            },1000)
        }
    },

    stopTimer(){ clearInterval(this.timer); this.isRunning=false },
    resetTimer(){ this.stopTimer(); this.timeLeft=25*60; this.updateDisplay() },
    setMinutes(m){ this.stopTimer(); this.timeLeft=m*60; this.updateDisplay() },

    // ---------- MODE ----------
    setMode(m){ this.mode=m },
    backToMenu(){ this.mode=null },

    // ---------- SCORE HELPERS ----------
    decrement(team){ if(team.score>0) team.score-- },
    inc(key){ this.twin.scores[key]++ },
    dec(key){ if(this.twin.scores[key]>0) this.twin.scores[key]-- },

    // ---------- SINGLE ----------
    single:{
        teamA:{name:'',score:0},
        teamB:{name:'',score:0}
    },

    // ---------- TWIN ----------
    twin:{
        team1:'', team2:'',
        round:1,
        scores:{m1a:0,m1b:0,m2a:0,m2b:0}
    },

    get match1A(){ return this.twin.team1 + ' A' },
    get match1B(){ return this.twin.round===1 ? this.twin.team2+' A' : this.twin.team2+' B' },
    get match2A(){ return this.twin.team1 + ' B' },
    get match2B(){ return this.twin.round===1 ? this.twin.team2+' B' : this.twin.team2+' A' },

    nextRound(){
        this.twin.round = this.twin.round===1 ? 2 : 1
        this.twin.scores={m1a:0,m1b:0,m2a:0,m2b:0}
    },

    // ---------- DASHBOARD CALC (NFV Twin) ----------
    // Gesamt: alle 4 Teilteams zählen fürs Hauptteam
    get team1Goals(){ return this.twin.scores.m1a + this.twin.scores.m2a },
    get team2Goals(){ return this.twin.scores.m1b + this.twin.scores.m2b },
    get team1Diff(){ return this.team1Goals - this.team2Goals },
    get team2Diff(){ return this.team2Goals - this.team1Goals },

    goalDiffClass(v){ if(v>0) return 'pos'; if(v<0) return 'neg'; return 'zero' },

    // ---------- LOCAL STORAGE ----------
    saveState(){
        const data = JSON.stringify({
            mode:this.mode,
            timeLeft:this.timeLeft,
            isRunning:false,
            single:this.single,
            twin:this.twin
        })
        localStorage.setItem('nfv_scoreboard', data)
    },

    loadState(){
        const raw = localStorage.getItem('nfv_scoreboard')
        if(!raw) return
        try{
            const s = JSON.parse(raw)
            this.mode = s.mode
            this.timeLeft = s.timeLeft ?? this.timeLeft
            this.single = s.single ?? this.single
            this.twin = s.twin ?? this.twin
        }catch(e){}
    }
}
}
</script>

</body>
</html>
