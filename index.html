<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFV Scoreboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-indigo-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl p-8">

    <!-- HEADER / TIMER BAR -->
    <div class="bg-slate-900 text-white rounded-2xl p-6 mb-10 shadow-xl">
        <div class="flex flex-wrap items-center justify-between gap-6">

            <div>
                <div class="text-sm opacity-70">Spielzeit</div>
                <div class="text-5xl font-mono font-bold" x-text="timerDisplay"></div>
            </div>

            <div class="flex flex-wrap gap-3 items-center">
                <button @click="startTimer"
                    class="px-6 py-3 bg-green-500 rounded-xl font-bold hover:bg-green-600">
                    <span x-show="!isRunning">▶ Start</span>
                    <span x-show="isRunning">⏸ Pause</span>
                </button>

                <button @click="resetTimer"
                    class="px-6 py-3 bg-yellow-500 rounded-xl font-bold hover:bg-yellow-600">
                    Reset
                </button>
            </div>

            <div class="flex flex-wrap gap-2">
                <template x-for="m in [10,15,20,25,30]">
                    <button @click="setMinutes(m)"
                        class="px-4 py-2 rounded-lg font-bold"
                        :class="m===25 ? 'bg-indigo-500 text-white' : 'bg-white text-black'">
                        <span x-text="m + 'm'"></span>
                    </button>
                </template>
            </div>

        </div>
    </div>

    <!-- MODE SELECT -->
    <template x-if="mode === null">
        <div class="text-center">
            <h1 class="text-4xl font-bold mb-12">Spielmodus wählen</h1>
            <div class="grid md:grid-cols-2 gap-10">
                <button @click="mode='single'" class="modeCard bg-blue-600 hover:bg-blue-700">
                    ⚽<br>Single-Spiel
                </button>
                <button @click="mode='twin'" class="modeCard bg-indigo-600 hover:bg-indigo-700">
                    👥<br>Twin-Modus
                </button>
            </div>
        </div>
    </template>

    <!-- SINGLE MODE -->
    <template x-if="mode==='single'">
        <div>
            <h2 class="sectionTitle">Single-Spiel</h2>

            <div class="grid md:grid-cols-2 gap-6 mb-10">
                <input x-model="single.teamA.name" placeholder="Team A" class="input">
                <input x-model="single.teamB.name" placeholder="Team B" class="input">
            </div>

            <template x-if="single.teamA.name && single.teamB.name">
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="teamCard bg-blue-600">
                        <h3 x-text="single.teamA.name"></h3>
                        <div class="score" x-text="single.teamA.score"></div>
                        <button @click="single.teamA.score++" class="goalBtn">+1 Tor</button>
                    </div>
                    <div class="teamCard bg-green-600">
                        <h3 x-text="single.teamB.name"></h3>
                        <div class="score" x-text="single.teamB.score"></div>
                        <button @click="single.teamB.score++" class="goalBtn">+1 Tor</button>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- TWIN MODE -->
    <template x-if="mode==='twin'">
        <div>
            <h2 class="sectionTitle">Twin-Modus</h2>

            <div class="grid md:grid-cols-2 gap-6 mb-10">
                <input x-model="twin.team1" placeholder="Team 1" class="input">
                <input x-model="twin.team2" placeholder="Team 2" class="input">
            </div>

            <template x-if="twin.team1 && twin.team2">
                <div class="space-y-12">

                    <div class="text-center">
                        <div class="text-xl font-semibold mb-2">
                            Runde <span x-text="twin.round"></span>
                        </div>
                        <button @click="nextRound" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">
                            Nächste Runde
                        </button>
                    </div>

                    <div class="grid md:grid-cols-2 gap-10">

                        <!-- MATCH 1 -->
                        <div class="matchCard">
                            <div class="matchTitle">Spiel 1</div>
                            <div class="matchTeams">
                                <span x-text="match1A"></span>
                                <div class="scoreRow">
                                    <button @click="twin.scores.m1a++">+</button>
                                    <span x-text="twin.scores.m1a"></span>
                                    <span>:</span>
                                    <span x-text="twin.scores.m1b"></span>
                                    <button @click="twin.scores.m1b++">+</button>
                                </div>
                                <span x-text="match1B"></span>
                            </div>
                        </div>

                        <!-- MATCH 2 -->
                        <div class="matchCard">
                            <div class="matchTitle">Spiel 2</div>
                            <div class="matchTeams">
                                <span x-text="match2A"></span>
                                <div class="scoreRow">
                                    <button @click="twin.scores.m2a++">+</button>
                                    <span x-text="twin.scores.m2a"></span>
                                    <span>:</span>
                                    <span x-text="twin.scores.m2b"></span>
                                    <button @click="twin.scores.m2b++">+</button>
                                </div>
                                <span x-text="match2B"></span>
                            </div>
                        </div>

                    </div>
                </div>
            </template>
        </div>
    </template>

</div>

<style>
.modeCard { @apply text-white text-3xl font-bold p-16 rounded-3xl shadow-xl transition }
.sectionTitle { @apply text-3xl font-bold text-center mb-10 }
.input { @apply p-4 border rounded-xl w-full text-lg }
.teamCard { @apply text-white p-10 rounded-3xl text-center shadow-xl }
.teamCard h3 { @apply text-2xl font-bold mb-4 }
.score { @apply text-7xl font-black mb-6 }
.goalBtn { @apply px-10 py-4 bg-white text-black text-xl font-bold rounded-xl }
.matchCard { @apply bg-slate-100 p-8 rounded-3xl shadow-lg text-center }
.matchTitle { @apply text-xl font-bold mb-6 }
.matchTeams { @apply space-y-4 text-xl font-semibold }
.scoreRow { @apply flex justify-center items-center gap-4 text-3xl font-bold }
.scoreRow button { @apply px-4 py-2 bg-indigo-600 text-white rounded-lg }
</style>

<script>
function app(){
return{
    mode:null,

    // TIMER
    timeLeft:25*60,
    timerDisplay:'25:00',
    isRunning:false,
    timer:null,

    init(){ this.updateDisplay() },

    updateDisplay(){
        const m=Math.floor(this.timeLeft/60)
        const s=this.timeLeft%60
        this.timerDisplay=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`
    },

    startTimer(){
        if(this.isRunning){
            clearInterval(this.timer)
            this.isRunning=false
        }else{
            this.isRunning=true
            this.timer=setInterval(()=>{
                if(this.timeLeft>0){
                    this.timeLeft--
                    this.updateDisplay()
                }else{
                    this.stopTimer()
                    alert("Zeit abgelaufen!")
                }
            },1000)
        }
    },

    stopTimer(){
        clearInterval(this.timer)
        this.isRunning=false
    },

    resetTimer(){
        this.stopTimer()
        this.timeLeft=25*60
        this.updateDisplay()
    },

    setMinutes(m){
        this.stopTimer()
        this.timeLeft=m*60
        this.updateDisplay()
    },

    // SINGLE
    single:{
        teamA:{name:'',score:0},
        teamB:{name:'',score:0}
    },

    // TWIN
    twin:{
        team1:'', team2:'',
        round:1,
        scores:{m1a:0,m1b:0,m2a:0,m2b:0}
    },

    get match1A(){ return this.twin.team1 + ' A' },
    get match1B(){ return this.twin.round===1 ? this.twin.team2+' A' : this.twin.team2+' B' },
    get match2A(){ return this.twin.team1 + ' B' },
    get match2B(){ return this.twin.round===1 ? this.twin.team2+' B' : this.twin.team2+' A' },

    nextRound(){
        this.twin.round = this.twin.round===1 ? 2 : 1
        this.twin.scores={m1a:0,m1b:0,m2a:0,m2b:0}
    }
}}
</script>

</body>
</html>
