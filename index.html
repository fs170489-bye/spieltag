<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NFV Scoreboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyDwj4kaT6VFJgrPg457Cq8AVrcG6jQTRl0",
 authDomain: "nfv-scoreboard.firebaseapp.com",
 databaseURL: "https://nfv-scoreboard-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "nfv-scoreboard",
 storageBucket: "nfv-scoreboard.firebasestorage.app",
 messagingSenderId: "727289331208",
 appId: "1:727289331208:web:de5e36f52c6d82b56ddbbd"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

window.db=db
window.dbRef=ref
window.dbSet=set
window.dbOnValue=onValue

</script>

</head>


<body class="bg-slate-100 min-h-screen p-6 font-sans">

<div x-data="app()" x-init="init()" class="max-w-6xl mx-auto space-y-8">


<!-- TIMER -->

<div class="bg-slate-900 text-white p-6 rounded-2xl text-center">

<div class="text-xs opacity-70">SPIELZEIT</div>

<div class="text-6xl font-mono"
:class="{'animate-pulse text-red-500': timeLeft<=60}"
x-text="timerDisplay"></div>

<div class="mt-3 text-2xl font-bold">

<span x-text="team1"></span>

<span class="mx-2" x-text="pointsA"></span>

:

<span class="mx-2" x-text="pointsB"></span>

<span x-text="team2"></span>

</div>

<div class="flex gap-3 justify-center mt-4">

<button @click="testTimer()" class="px-4 py-2 bg-purple-500 rounded text-white">
Test 10s
</button>

<button @click="startPauseTimer()" class="px-6 py-2 bg-green-500 rounded text-white">
Start / Pause
</button>

<button @click="resetTimer()" class="px-6 py-2 bg-yellow-500 rounded text-white">
Reset
</button>

</div>

</div>


<!-- MODUS -->

<div x-show="step===0" class="bg-white p-8 rounded-2xl shadow text-center">

<h2 class="text-3xl font-bold mb-6">Spielmodus wählen</h2>

<div class="grid grid-cols-2 gap-6">

<button
@click="mode='single'; next()"
class="p-12 bg-blue-600 text-white text-2xl font-bold rounded-xl">
Single
</button>

<button
@click="mode='twin'; next()"
class="p-12 bg-indigo-600 text-white text-2xl font-bold rounded-xl">
Twin
</button>

</div>

</div>


<!-- TEAM INPUT -->

<div x-show="step===1" class="bg-white p-8 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">Teams eingeben</h2>

<div class="grid grid-cols-2 gap-4">

<input x-model="team1" placeholder="Team A" class="border p-3 rounded">
<input x-model="team2" placeholder="Team B" class="border p-3 rounded">

</div>

<div class="flex justify-between mt-6">

<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">
Zurück
</button>

<button
@click="next()"
:disabled="!team1 || !team2"
class="px-6 py-2 bg-indigo-600 text-white rounded">
Weiter
</button>

</div>

</div>


<!-- ZEIT -->

<div x-show="step===2" class="bg-white p-8 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">Zeit einstellen</h2>

<input type="number" x-model.number="minutes"
class="border p-3 rounded w-40 text-xl">

<div class="flex justify-between mt-6">

<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">
Zurück
</button>

<button @click="next()" class="px-6 py-2 bg-indigo-600 text-white rounded">
Weiter
</button>

</div>

</div>


<!-- FELDER -->

<div x-show="step===3" class="bg-white p-8 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-4">Spielfeld wählen</h2>

<div class="flex gap-4">

<button @click="fields=1" :class="fieldBtn(1)">HF</button>

<button @click="fields=2" :class="fieldBtn(2)">HF + NF</button>

<button x-show="mode==='twin'" @click="fields=3" :class="fieldBtn(3)">HF + NF1</button>

<button x-show="mode==='twin'" @click="fields=4" :class="fieldBtn(4)">HF + NF1 + NF2</button>

</div>

<div class="flex justify-between mt-6">

<button @click="prev()" class="px-6 py-2 bg-gray-500 text-white rounded">
Zurück
</button>

<button @click="startGame()" :disabled="fields===0"
class="px-6 py-2 bg-green-600 text-white rounded">
Spiel starten
</button>

</div>

</div>


<!-- SPIEL -->

<div x-show="step===4" class="space-y-6">

<h2 class="text-3xl font-bold">
Begegnung <span x-text="round"></span> / 3
</h2>


<template x-for="f in fieldList">

<div class="bg-white p-6 rounded-2xl shadow">

<h3 class="font-bold mb-2" x-text="f.name"></h3>

<div class="grid grid-cols-3 text-center items-center">

<div>

<div class="text-lg font-semibold mb-2" x-text="f.teamA"></div>

<button @click="dec(f.keyA)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>

<button @click="inc(f.keyA)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>

</div>

<div class="text-5xl font-bold">

<span x-text="scores[f.keyA]"></span> :

<span x-text="scores[f.keyB]"></span>

</div>

<div>

<div class="text-lg font-semibold mb-2" x-text="f.teamB"></div>

<button @click="dec(f.keyB)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-red-500 text-white rounded-xl">−</button>

<button @click="inc(f.keyB)" :disabled="timeLeft===0"
class="w-20 h-20 text-4xl bg-green-600 text-white rounded-xl">+</button>

</div>

</div>

</div>

</template>


<div class="flex justify-between mt-6">

<button @click="prevRound()" class="px-6 py-3 bg-gray-500 text-white rounded">
← Zurück
</button>

<button @click="nextRound()"
class="px-6 py-3 bg-indigo-600 text-white rounded"
x-text="round===3 ? 'Endergebnis' : 'Weiter →'">
</button>

</div>

</div>


<!-- ENDERGEBNIS -->

<div x-show="step===5" class="bg-white p-8 rounded-2xl shadow text-center">

<h2 class="text-3xl font-bold mb-6">Endergebnis</h2>

<div class="text-4xl font-bold">

<span x-text="team1"></span>

<span class="mx-4" x-text="pointsA"></span>

:

<span class="mx-4" x-text="pointsB"></span>

<span x-text="team2"></span>

</div>

<button @click="resetAll()"
class="mt-6 px-6 py-3 bg-indigo-600 text-white rounded">
Neues Spiel
</button>

</div>


</div>


<script>

function app(){

return{

sessionId:"liveSpiel",

mode:null,
step:0,

team1:"",
team2:"",

fields:0,

round:1,
minutes:10,

scores:{m1a:0,m1b:0,m2a:0,m2b:0,m3a:0,m3b:0,m4a:0,m4b:0},

pointsA:0,
pointsB:0,

timeLeft:0,
timer:null,
timerDisplay:"00:00",

init(){

this.listenFirebase()

},

syncFirebase(){

dbSet(
dbRef(db,"spiele/"+this.sessionId),
{
mode:this.mode,
round:this.round,
scores:this.scores,
timeLeft:this.timeLeft,
pointsA:this.pointsA,
pointsB:this.pointsB
})

},

listenFirebase(){

dbOnValue(
dbRef(db,"spiele/"+this.sessionId),
(snapshot)=>{

const data=snapshot.val()

if(!data)return

this.round=data.round
this.scores=data.scores
this.timeLeft=data.timeLeft
this.pointsA=data.pointsA
this.pointsB=data.pointsB

})

},

next(){this.step++},

prev(){if(this.step>0)this.step--},

prevRound(){

if(this.round>1){

this.round--

this.resetScores()

}else{

this.step=3

}

},

startGame(){

this.timeLeft=this.minutes*60
this.updateDisplay()

this.step=4

},

nextRound(){

this.calculateTendenz()

if(this.round<3){

this.round++
this.resetScores()

}else{

this.step=5

}

},

calculateTendenz(){

let a1=this.scores.m1a
let b1=this.scores.m1b

if(a1>b1)this.pointsA++
else if(b1>a1)this.pointsB++
else{this.pointsA++;this.pointsB++;}

if(this.mode==="twin"){

let a2=this.scores.m2a
let b2=this.scores.m2b

if(a2>b2)this.pointsA++
else if(b2>a2)this.pointsB++
else{this.pointsA++;this.pointsB++;}

}

},

resetScores(){

this.scores={m1a:0,m1b:0,m2a:0,m2b:0,m3a:0,m3b:0,m4a:0,m4b:0}

},

resetAll(){

location.reload()

},

inc(k){

if(this.timeLeft===0)return

this.scores[k]++

this.syncFirebase()

},

dec(k){

if(this.timeLeft===0)return

if(this.scores[k]>0)this.scores[k]--

this.syncFirebase()

},

testTimer(){

this.timeLeft=10

this.updateDisplay()

},

startPauseTimer(){

if(this.timer){

clearInterval(this.timer)

this.timer=null

return

}

this.timer=setInterval(()=>{

if(this.timeLeft>0){

this.timeLeft--

this.updateDisplay()

this.syncFirebase()

}else{

clearInterval(this.timer)

this.timer=null

}

},1000)

},

resetTimer(){

this.timeLeft=this.minutes*60

this.updateDisplay()

},

updateDisplay(){

let m=Math.floor(this.timeLeft/60)

let s=this.timeLeft%60

this.timerDisplay=m.toString().padStart(2,"0")+":"+s.toString().padStart(2,"0")

},

fieldBtn(n){

return "px-5 py-3 rounded text-white "+(this.fields===n?"bg-indigo-600":"bg-gray-400")

},

get fieldList(){

let arr=[]

arr.push({name:"HF1",teamA:this.team1,teamB:this.team2,keyA:"m1a",keyB:"m1b"})

if(this.fields>=2){

arr.push({name:this.mode==="single"?"NF":"HF2",teamA:this.team1,teamB:this.team2,keyA:"m2a",keyB:"m2b"})

}

if(this.mode==="twin" && this.fields>=3){

arr.push({name:"NF1",teamA:this.team1,teamB:this.team2,keyA:"m3a",keyB:"m3b"})

}

if(this.mode==="twin" && this.fields===4){

arr.push({name:"NF2",teamA:this.team1,teamB:this.team2,keyA:"m4a",keyB:"m4b"})

}

return arr

}

}

}

</script>

</body>
</html>
